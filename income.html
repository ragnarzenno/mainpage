<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Income</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Income">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root {
      --bg:#050608;
      --card:#0b0d12;
      --line:rgba(255,255,255,.08);
      --text:#eef2f7;
      --muted:#97a2b3;
      --gold:#d1b16a;
      --accent:#b89b5e;
    }
    html,body {
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      overflow:hidden;
    }
    .wrap {
      width:1024px;
      height:768px;
      margin:0 auto;
      box-sizing:border-box;
      padding:10px 12px;
      overflow:hidden;
    }
    .top {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      min-height:24px;
    }
    .topClockOnly {
      justify-content:flex-end;
    }
    .clock {
      font-size:14px;
      color:#8f949d;
    }
    .metrics {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-bottom:10px;
    }
    .card {
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.012));
      border:1px solid rgba(209,177,106,.18);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 6px 22px rgba(0,0,0,.28);
      border-radius:12px;
      padding:12px;
      box-sizing:border-box;
      overflow:hidden;
    }
    .label {
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:#9ea6b1;
      margin-bottom:8px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .value {
      font-size:34px;
      font-weight:900;
      line-height:1;
      color:var(--gold);
    }
    .panelTitle {
      margin:0 0 8px 0;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--accent);
      text-shadow:0 0 12px rgba(209,177,106,.08);
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .grid {
      display:grid;
      grid-template-columns:62% 38%;
      gap:10px;
      height:calc(100% - 126px);
    }
    .chartWrap {
      position:relative;
      height:100%;
    }
    svg {
      width:100%;
      height:100%;
      display:block;
    }
    .tooltip {
      position:absolute;
      display:none;
      pointer-events:none;
      z-index:20;
      background:#0c1118;
      border:1px solid var(--line);
      border-radius:10px;
      padding:8px 10px;
      box-shadow:0 10px 25px rgba(0,0,0,.4);
      font-size:13px;
      color:#fff;
    }
    table {
      width:100%;
      border-collapse:collapse;
      font-size:15px;
    }
    th, td {
      border-bottom:1px solid var(--line);
      padding:7px 6px;
      text-align:left;
    }
    th {
      color:var(--accent);
      text-shadow:0 0 12px rgba(209,177,106,.08);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.1em;
    }
    .nav {
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-top:8px;
    }
    .btn {
      display:inline-block;
      text-decoration:none;
      color:#fff;
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px 14px;
      font-size:15px;
      font-weight:800;
      background:linear-gradient(180deg, rgba(209,177,106,.12), rgba(209,177,106,.05));
      cursor:pointer;
      -webkit-appearance:none;
      appearance:none;
    }
    .sync {
      font-size:12px;
      color:#8f949d;
      margin-top:8px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="top topClockOnly">
    <div class="clock" id="clock">—</div>
  </div>

  <div class="metrics">
    <div class="card"><div class="label" id="label_income_yesterday">Вчера</div><div class="value" id="income_yesterday">—</div></div>
    <div class="card"><div class="label" id="label_income_today">Сегодня</div><div class="value" id="income_today">—</div></div>
    <div class="card"><div class="label" id="label_income_month">Текущий месяц</div><div class="value" id="income_month">—</div></div>
    <div class="card"><div class="label" id="label_income_total">Всего в таблице</div><div class="value" id="income_total">—</div></div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="panelTitle" id="panel_chart">График дохода</div>
      <div class="chartWrap">
        <svg id="chart" viewBox="0 0 900 560" preserveAspectRatio="none"></svg>
        <div class="tooltip" id="tooltip"></div>
      </div>
      <div class="sync" id="sync_meta">Нет данных</div>
    </div>

    <div class="card">
      <div class="panelTitle" id="panel_table">Таблица заработка</div>
      <table>
        <thead><tr><th id="table_col_date">Дата</th><th id="table_col_amount">Сумма</th></tr></thead>
        <tbody id="income_table"></tbody>
      </table>
    </div>
  </div>

  <div class="nav">
    <button class="btn" type="button" onclick="goInternal('index.html')">← Главная</button>
    <button class="btn" type="button" onclick="window.location.reload()">Обновить</button>
  </div>
</div>

<script>
var GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwI-yuwuNLx0mFVocA43t_N1CKe7I1-yVRd1d2PVVhoQqZNyQT8zCa_G-m9UaVQHrFPZA/exec";
var REFRESH_MS = 30000;
var tooltip = null;

function pad(n) {
  return (n < 10 ? "0" : "") + n;
}

function tickClock() {
  var d = new Date();
  document.getElementById("clock").textContent =
    pad(d.getDate()) + "." + pad(d.getMonth() + 1) + "." + d.getFullYear() + "  " +
    pad(d.getHours()) + ":" + pad(d.getMinutes());
}

tickClock();
setInterval(tickClock, 1000);

function money(v) {
  if (v === null || v === undefined || v === "") return "—";
  var s = ("" + v).replace(/\s+/g, "").replace(",", ".");
  var num = parseFloat(s);
  if (isNaN(num)) return "" + v;
  var parts = (Math.round(num * 100) / 100).toFixed(2).split(".");
  var intp = parts[0], frac = parts[1], out = "";
  for (var i = 0; i < intp.length; i++) {
    var ch = intp[intp.length - 1 - i];
    out = ch + out;
    if ((i + 1) % 3 === 0 && i !== intp.length - 1) out = " " + out;
  }
  return out + "," + frac;
}

function setText(id, val, asMoney) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = asMoney ? money(val) : ((val || "").toString().trim() || "—");
}

function loadJsonp() {
  var old = document.getElementById("jsonp_script");
  if (old && old.parentNode) old.parentNode.removeChild(old);

  var s = document.createElement("script");
  s.id = "jsonp_script";
  s.src = GAS_WEBAPP_URL + "?callback=renderIncome&page=income&_=" + Date.now();
  s.onerror = function() {
    document.getElementById("sync_meta").textContent = "Ошибка загрузки данных";
  };
  document.body.appendChild(s);
}

function renderIncome(data) {
  if (!data || data.ok === false) {
    document.getElementById("sync_meta").textContent = data && data.error ? ("Ошибка: " + data.error) : "Ошибка данных";
    renderTable([]);
    drawChart([]);
    return;
  }

  setText("label_income_yesterday", data.label_income_yesterday, false);
  setText("label_income_today", data.label_income_today, false);
  setText("label_income_month", data.label_income_month, false);
  setText("label_income_total", data.label_income_total, false);
  setText("panel_chart", data.panel_chart, false);
  setText("panel_table", data.panel_table, false);
  setText("table_col_date", data.table_col_date, false);
  setText("table_col_amount", data.table_col_amount, false);

  setText("income_yesterday", data.income_yesterday, true);
  setText("income_today", data.income_today, true);
  setText("income_month", data.income_month, true);
  setText("income_total", data.income_total, true);
  renderTable(data.chart_points || []);
  drawChart(data.chart_points || []);
  document.getElementById("sync_meta").textContent = data.updated_at ? ("Обновлено: " + data.updated_at) : "OK";
}

function renderTable(points) {
  var tbody = document.getElementById("income_table");
  tbody.innerHTML = "";
  if (!points.length) {
    var tr = document.createElement("tr");
    tr.innerHTML = "<td colspan='2'>—</td>";
    tbody.appendChild(tr);
    return;
  }
  for (var i = 0; i < points.length; i++) {
    var tr = document.createElement("tr");
    tr.innerHTML = "<td>" + (points[i].label || "—") + "</td><td>" + money(points[i].value) + "</td>";
    tbody.appendChild(tr);
  }
}

function drawChart(points) {
  var svg = document.getElementById("chart");
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  tooltip = document.getElementById("tooltip");

  var W = 900, H = 560, L = 65, R = 20, T = 20, B = 55;
  var iw = W - L - R, ih = H - T - B;

  if (!points.length) {
    var txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
    txt.setAttribute("x", "50%");
    txt.setAttribute("y", "50%");
    txt.setAttribute("text-anchor", "middle");
    txt.setAttribute("fill", "rgba(255,255,255,.35)");
    txt.setAttribute("font-size", "24");
    txt.textContent = "Нет данных";
    svg.appendChild(txt);
    return;
  }

  var vals = points.map(function(p) {
    return +(("" + p.value).replace(/\s+/g, "").replace(",", ".")) || 0;
  });
  var min = Math.min.apply(null, vals);
  var max = Math.max.apply(null, vals);
  if (min === max) {
    min = min - 1;
    max = max + 1;
  }

  for (var gy = 0; gy < 5; gy++) {
    var y = T + ih * gy / 4;
    var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", L);
    line.setAttribute("x2", W - R);
    line.setAttribute("y1", y);
    line.setAttribute("y2", y);
    line.setAttribute("stroke", "rgba(255,255,255,.08)");
    svg.appendChild(line);

    var val = max - (max - min) * gy / 4;
    var label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    label.setAttribute("x", L - 10);
    label.setAttribute("y", y + 4);
    label.setAttribute("text-anchor", "end");
    label.setAttribute("fill", "rgba(255,255,255,.5)");
    label.setAttribute("font-size", "13");
    label.textContent = money(val);
    svg.appendChild(label);
  }

  var path = "";
  for (var i = 0; i < points.length; i++) {
    var x = L + iw * i / Math.max(points.length - 1, 1);
    var y = T + ih - ((vals[i] - min) / (max - min)) * ih;
    path += (i === 0 ? "M" : "L") + x + " " + y + " ";
  }

  var area = document.createElementNS("http://www.w3.org/2000/svg", "path");
  area.setAttribute("d", path + "L " + (L + iw) + " " + (T + ih) + " L " + L + " " + (T + ih) + " Z");
  area.setAttribute("fill", "rgba(209,177,106,.10)");
  svg.appendChild(area);

  var lp = document.createElementNS("http://www.w3.org/2000/svg", "path");
  lp.setAttribute("d", path);
  lp.setAttribute("fill", "none");
  lp.setAttribute("stroke", "#d1b16a");
  lp.setAttribute("stroke-width", "4");
  lp.setAttribute("stroke-linecap", "round");
  lp.setAttribute("stroke-linejoin", "round");
  svg.appendChild(lp);

  for (var i = 0; i < points.length; i++) {
    var x = L + iw * i / Math.max(points.length - 1, 1);
    var y = T + ih - ((vals[i] - min) / (max - min)) * ih;

    var c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", x);
    c.setAttribute("cy", y);
    c.setAttribute("r", 6);
    c.setAttribute("fill", "#d1b16a");
    c.setAttribute("stroke", "#0b0d12");
    c.setAttribute("stroke-width", "3");
    c.style.cursor = "pointer";
    (function(p, node) {
      node.addEventListener("click", function(evt) {
        showTip(p, evt);
      });
    })(points[i], c);
    svg.appendChild(c);

    var t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", x);
    t.setAttribute("y", H - 16);
    t.setAttribute("text-anchor", "middle");
    t.setAttribute("fill", "rgba(255,255,255,.55)");
    t.setAttribute("font-size", "12");
    t.textContent = points[i].label;
    svg.appendChild(t);
  }
}

function showTip(p, evt) {
  tooltip.style.display = "block";
  tooltip.innerHTML = "<strong>" + (p.label || "") + "</strong><br>" + money(p.value);
  var wrapRect = document.querySelector(".chartWrap").getBoundingClientRect();
  tooltip.style.left = Math.max(8, evt.clientX - wrapRect.left - 36) + "px";
  tooltip.style.top = Math.max(8, evt.clientY - wrapRect.top - 58) + "px";
}

document.addEventListener("click", function(e) {
  if (tooltip && e.target.tagName !== "circle") {
    tooltip.style.display = "none";
  }
});

loadJsonp();
setInterval(loadJsonp, REFRESH_MS);
function goInternal(url) {
  window.location.href = url;
}

document.addEventListener('click', function(e) {
  var node = e.target;
  while (node && node !== document) {
    if (node.tagName === 'A' && node.getAttribute('href')) {
      var href = node.getAttribute('href');
      if (href.indexOf('http') !== 0 && href.indexOf('//') !== 0 && href.charAt(0) !== '#') {
        e.preventDefault();
        window.location.href = href;
        return;
      }
    }
    node = node.parentNode;
  }
}, false);
</script>
</body>
</html>
