<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Income</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Income">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root{
      --bg:#050608;
      --card:#0b0d12;
      --line:rgba(209,177,106,.30);
      --text:#eef2f7;
      --muted:#97a2b3;
      --gold:#d1b16a;
      --accent:#b89b5e;
      --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    }
    html,body{
      margin:0;padding:0;width:100%;height:100%;
      background:var(--bg);color:var(--text);
      font-family:var(--font);
      overflow:hidden;
    }
    .wrap{
      width:1024px;height:768px;margin:0 auto;box-sizing:border-box;
      padding:12px;overflow:hidden;
    }
    .top{
      display:flex;justify-content:flex-end;align-items:center;
      margin-bottom:10px;height:22px;
    }
    .clock{font-size:14px;color:#c6ced9;letter-spacing:.03em;}
    .stats{
      display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px;
    }
    .card{
      background:linear-gradient(180deg, rgba(13,16,22,.98), rgba(8,10,14,.98));
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 0 0 1px rgba(209,177,106,.04) inset, 0 10px 30px rgba(0,0,0,.25);
      padding:12px;box-sizing:border-box;overflow:hidden;
    }
    .metricCard{height:76px;display:flex;flex-direction:column;min-height:0;}
    .label{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .value{font-size:32px;font-weight:900;line-height:1;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .value.moneyLong{font-size:27px;}
    .grid{display:grid;grid-template-columns:62% 38%;gap:10px;height:calc(100% - 118px);}
    .chartCard{height:100%;}
    .tableCard{height:100%;display:flex;flex-direction:column;}
    .panelTitle{
      margin:0 0 10px 0;font-size:13px;text-transform:uppercase;letter-spacing:.12em;
      color:var(--accent);font-weight:900;
    }
    .chartWrap{position:relative;height:100%;}
    svg{width:100%;height:100%;display:block;}
    .tooltip{
      position:absolute;display:none;pointer-events:none;z-index:20;background:#0c1118;
      border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:8px 10px;
      box-shadow:0 10px 25px rgba(0,0,0,.4);font-size:14px;color:#fff;
    }
    table{width:100%;border-collapse:collapse;font-size:15px;}
    th,td{border-bottom:1px solid rgba(255,255,255,.08);padding:8px 6px;text-align:left;}
    th{color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:.1em;}
    .tableWrap{flex:1;overflow:hidden;}
    .tableNav{
      display:flex;
      justify-content:center;
      align-items:flex-end;
      padding-top:16px;
      padding-bottom:4px;
      min-height:70px;
      flex:0 0 70px;
    }
    .backBtn{
      position:relative;
      z-index:5;
    }
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      width:74px;height:46px;color:#fff;border:1px solid rgba(209,177,106,.35);
      border-radius:12px;font-size:26px;font-weight:900;
      background:linear-gradient(180deg, rgba(209,177,106,.22), rgba(209,177,106,.08));
      box-shadow:0 0 0 1px rgba(209,177,106,.05) inset;
      cursor:pointer;-webkit-appearance:none;appearance:none;
    }
    .sync{margin-top:8px;font-size:12px;color:var(--muted);text-align:center;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="clock" id="clock"></div>
  </div>

  <div class="stats">
    <div class="card metricCard">
      <div class="label">Вчера</div>
      <div class="value" id="income_yesterday">—</div>
    </div>
    <div class="card metricCard">
      <div class="label">Сегодня</div>
      <div class="value" id="income_today">—</div>
    </div>
    <div class="card metricCard">
      <div class="label">Текущий месяц</div>
      <div class="value" id="income_month">—</div>
    </div>
  </div>

  <div class="grid">
    <div class="card chartCard">
      <div class="panelTitle">График дохода</div>
      <div class="chartWrap">
        <svg id="chart" viewBox="0 0 900 560" preserveAspectRatio="none"></svg>
        <div class="tooltip" id="tooltip"></div>
      </div>
      <div class="sync" id="sync_meta">Нет данных</div>
    </div>

    <div class="card tableCard">
      <div class="panelTitle">Таблица заработка</div>
      <div class="tableWrap">
        <table>
          <thead><tr><th>Дата</th><th>Сумма</th></tr></thead>
          <tbody id="income_table"></tbody>
        </table>
      </div>
      <div class="tableNav">
        <button class="btn backBtn" id="back_btn" type="button">←</button>
      </div>
    </div>
  </div>
</div>

<script>
var GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwI-yuwuNLx0mFVocA43t_N1CKe7I1-yVRd1d2PVVhoQqZNyQT8zCa_G-m9UaVQHrFPZA/exec";
var REFRESH_MS = 30000;
var tooltip = null;
var SVG_NS = "http://www.w3.org/2000/svg";
var FONT_FAMILY = '-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif';

function goInternal(url){
  try{
    window.location.href = url;
  }catch(e){
    try{ window.location.assign(url); }catch(e2){}
  }
}
function pad(n){ return (n < 10 ? "0" : "") + n; }
function tickClock(){
  var d = new Date();
  document.getElementById("clock").textContent =
    pad(d.getDate()) + "." + pad(d.getMonth()+1) + "." + d.getFullYear() + " " +
    pad(d.getHours()) + ":" + pad(d.getMinutes());
}
tickClock();
setInterval(tickClock, 1000);

function parseCurrencyValue(v){
  if(v === null || v === undefined || v === "") return null;
  var raw = ("" + v).replace(/ /g, " ").trim();
  if(!raw) return null;
  var currencyMatch = raw.match(/(₽|\$|€|£|₸|₴|₾|₺|₿|AED|USD|EUR|RUB|KZT|UAH|GEL|TRY|BYN|сом|сум|тенге|руб\.?|долл?\.?|евро)/i);
  var currency = currencyMatch ? currencyMatch[0] : "";
  var numPart = raw.replace(/[^0-9,\.\-]/g, "");
  if(!numPart) return { text: raw, currency: currency, number: null };
  var normalized = numPart.replace(/\s+/g, "").replace(/,/g, ".");
  var firstDot = normalized.indexOf('.');
  if(firstDot !== -1){
    normalized = normalized.slice(0, firstDot + 1) + normalized.slice(firstDot + 1).replace(/\./g, '');
  }
  var n = parseFloat(normalized);
  if(isNaN(n)) return { text: raw, currency: currency, number: null };
  var text = n.toLocaleString("ru-RU", {minimumFractionDigits:2, maximumFractionDigits:2});
  if(currency) text += " " + currency;
  return { text: text, currency: currency, number: n };
}
function money(v){
  var parsed = parseCurrencyValue(v);
  return parsed ? parsed.text : "—";
}
function fitMoneyClass(el, text){
  if(!el) return;
  el.className = el.className.replace(/\s?moneyLong/g, '');
  if((text || '').length >= 13) el.className += ' moneyLong';
}
function setText(id, val){
  var el = document.getElementById(id);
  if(el){
    var txt = money(val);
    el.textContent = txt;
    fitMoneyClass(el, txt);
  }
}
function loadJsonp(){
  var old = document.getElementById("jsonp_script");
  if(old && old.parentNode) old.parentNode.removeChild(old);
  var s = document.createElement("script");
  s.id = "jsonp_script";
  s.src = GAS_WEBAPP_URL + "?callback=renderIncome&page=income&_=" + Date.now();
  s.onerror = function(){ document.getElementById("sync_meta").textContent = "Ошибка загрузки данных"; };
  document.body.appendChild(s);
}
function renderIncome(data){
  try{
    setText("income_yesterday", data.income_yesterday);
    setText("income_today", data.income_today);
    setText("income_month", data.income_month);
    renderTable(data.chart_points || []);
    drawChart(data.chart_points || []);
    document.getElementById("sync_meta").textContent = data.updated_at ? ("Обновлено: " + data.updated_at) : "OK";
  }catch(err){
    document.getElementById("sync_meta").textContent = "Ошибка рендера: " + (err && err.message ? err.message : err);
  }
}
function renderTable(points){
  var tbody = document.getElementById("income_table");
  tbody.innerHTML = "";
  if(!points || !points.length){
    var tr = document.createElement("tr");
    tr.innerHTML = "<td>—</td><td>—</td>";
    tbody.appendChild(tr);
    return;
  }
  for(var i=0;i<points.length;i++){
    var tr = document.createElement("tr");
    tr.innerHTML = "<td>" + (points[i].label || "—") + "</td><td>" + money(points[i].value) + "</td>";
    tbody.appendChild(tr);
  }
}
function svgEl(name){
  return document.createElementNS(SVG_NS, name);
}
function setFont(el, size, fill, anchor, weight){
  el.setAttribute("font-family", FONT_FAMILY);
  el.setAttribute("font-size", size);
  el.setAttribute("fill", fill);
  el.setAttribute("font-weight", weight || "700");
  if(anchor) el.setAttribute("text-anchor", anchor);
}
function drawChart(points){
  var svg = document.getElementById("chart");
  svg.innerHTML = "";
  tooltip = document.getElementById("tooltip");

  if(!points || !points.length){
    var txt = svgEl("text");
    txt.setAttribute("x", "450");
    txt.setAttribute("y", "280");
    setFont(txt, "24", "#7f8a99", "middle");
    txt.textContent = "Нет данных";
    svg.appendChild(txt);
    return;
  }

  var W = 900, H = 560, L = 92, R = 32, T = 28, B = 86;
  var values = [], i;
  for(i=0;i<points.length;i++){
    var n = parseFloat(String(points[i].value).replace(/\s+/g, "").replace(",", "."));
    values.push(isNaN(n) ? 0 : n);
  }
  var max = Math.max.apply(null, values);
  if(max <= 0) max = 1;

  function x(idx){
    if(points.length === 1) return L + ((W - L - R) / 2);
    return L + ((W - L - R) * idx / (points.length - 1));
  }
  function y(v){ return T + (H - T - B) * (1 - (v / max)); }

  for(i=0;i<5;i++){
    var gv = max * (i / 4);
    var gy = y(gv);

    var line = svgEl("line");
    line.setAttribute("x1", L);
    line.setAttribute("x2", W - R);
    line.setAttribute("y1", gy);
    line.setAttribute("y2", gy);
    line.setAttribute("stroke", "rgba(255,255,255,.08)");
    svg.appendChild(line);

    var label = svgEl("text");
    label.setAttribute("x", L - 12);
    label.setAttribute("y", gy + 5);
    setFont(label, "14", "#9aa7b8", "end", "600");
    label.textContent = money(gv);
    svg.appendChild(label);
  }

  var polyPts = "";
  for(i=0;i<points.length;i++) polyPts += x(i) + "," + y(values[i]) + " ";
  var areaPts = L + "," + y(0) + " " + polyPts + (W - R) + "," + y(0);

  var area = svgEl("polygon");
  area.setAttribute("points", areaPts);
  area.setAttribute("fill", "rgba(209,177,106,.12)");
  svg.appendChild(area);

  var poly = svgEl("polyline");
  poly.setAttribute("points", polyPts);
  poly.setAttribute("fill", "none");
  poly.setAttribute("stroke", "#d1b16a");
  poly.setAttribute("stroke-width", "4");
  poly.setAttribute("stroke-linecap", "round");
  poly.setAttribute("stroke-linejoin", "round");
  svg.appendChild(poly);

  for(i=0;i<points.length;i++){
    var cx = x(i), cy = y(values[i]);

    var c = svgEl("circle");
    c.setAttribute("cx", cx);
    c.setAttribute("cy", cy);
    c.setAttribute("r", 6);
    c.setAttribute("fill", "#d1b16a");
    c.setAttribute("stroke", "#0b0d12");
    c.setAttribute("stroke-width", "3");
    (function(point, el){
      el.addEventListener("click", function(evt){
        tooltip.style.display = "block";
        tooltip.style.left = (evt.offsetX + 12) + "px";
        tooltip.style.top = (evt.offsetY - 6) + "px";
        tooltip.textContent = (point.label || "") + " — " + money(point.value);
      });
    })(points[i], c);
    svg.appendChild(c);

    var xl = svgEl("text");
    xl.setAttribute("x", cx);
    xl.setAttribute("y", H - 24);
    var anchor = "middle";
    if(i === 0) anchor = "start";
    if(i === points.length - 1) anchor = "end";
    setFont(xl, "14", "#9aa7b8", anchor, "600");
    xl.textContent = points[i].label || "";
    svg.appendChild(xl);
  }

  svg.addEventListener("click", function(e){
    if(e.target.tagName !== "circle" && tooltip) tooltip.style.display = "none";
  });
}

var backBtnEl = document.getElementById("back_btn");
if(backBtnEl){
  var backHandler = function(ev){
    if(ev && ev.preventDefault) ev.preventDefault();
    goInternal('index.html');
    return false;
  };
  backBtnEl.onclick = backHandler;
  if(backBtnEl.addEventListener){
    backBtnEl.addEventListener('touchend', backHandler, false);
    backBtnEl.addEventListener('click', backHandler, false);
  }
}

loadJsonp();
setInterval(loadJsonp, REFRESH_MS);
</script>
</body>
</html>
