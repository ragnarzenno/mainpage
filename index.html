<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Dashboard</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root{
      --bg:#050608;
      --cardTop:#10141b;
      --cardBottom:#090c12;
      --line:rgba(209,177,106,.18);
      --lineSoft:rgba(209,177,106,.08);
      --text:#eef2f7;
      --muted:#97a2b3;
      --gold:#d1b16a;
      --accent:#b89b5e;
      --gap:12px;
      --radius:18px;
      --pad:14px;
    }
    html,body{
      margin:0;padding:0;width:100%;height:100%;
      background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      overflow:hidden;
    }
    body{
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }
    .wrap{
      width:1024px;height:768px;box-sizing:border-box;
      padding:10px 14px 14px;
      overflow:hidden;
      position:relative;
    }
    .top{
      display:flex;justify-content:flex-end;align-items:center;
      height:26px;margin-bottom:8px;
    }
    .clock{
      font-size:14px;
      color:#d3d9e2;
      letter-spacing:.03em;
      font-weight:700;
    }

    .layout{
      height:calc(100% - 34px);
      display:grid;
      grid-template-columns:minmax(0, 62%) minmax(0, 38%);
      grid-template-rows:auto 1fr;
      gap:var(--gap);
      min-height:0;
    }

    .left,.right{
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:var(--gap);
    }
    .left{grid-column:1;grid-row:1;}
    .right{grid-column:2;grid-row:1;}

    .card{
      position:relative;
      background:linear-gradient(180deg, rgba(16,20,27,.98), rgba(9,12,18,.98));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.02),
        inset 0 1px 0 rgba(255,255,255,.03),
        0 10px 24px rgba(0,0,0,.18);
      padding:var(--pad);
      box-sizing:border-box;
      overflow:hidden;
    }
    .card:before{
      content:"";
      position:absolute;inset:0;
      border-radius:inherit;
      box-shadow:inset 0 0 0 1px var(--lineSoft);
      pointer-events:none;
    }

    .stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap);}
    .stats2{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--gap);}

    .metricCard{
      height:100px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      min-height:0;
    }
    .wideCard{
      height:92px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-height:0;
    }
    .goalsCard{
      height:124px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      min-height:0;
    }

    .label{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.18em;
      color:#a9b4c5;
      margin-bottom:8px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .panelTitle{
      margin:0 0 10px 0;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.16em;
      color:var(--accent);
      font-weight:900;
      line-height:1;
    }

    .value{
      font-size:31px;
      font-weight:900;
      line-height:1;
      color:var(--gold);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-top:2px;
    }
    .value.small{font-size:30px;}
    .value.moneyLong{font-size:27px;}
    .value.moneyXL{font-size:23px;}
    .value.white{color:#ffffff;}
    .sub{
      margin-top:auto;
      padding-top:9px;
      font-size:14px;
      line-height:1.05;
      color:#ecf2fb;
    }

    .wideRow,.goalRow{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:14px;
      align-items:center;
      min-height:0;
      flex:1;
    }
    .wideText,.goalText{
      overflow:hidden;
      font-weight:800;
      line-height:1.12;
      color:#f4f7fb;
    }
    .wideText{font-size:17px;}
    .goalText{font-size:18px;}
    .wideValue,.goalValue{
      font-size:30px;
      font-weight:900;
      color:var(--gold);
      white-space:nowrap;
      text-align:right;
    }
    .wideValue.moneyLong,.goalValue.moneyLong{font-size:26px;}
    .wideValue.moneyXL,.goalValue.moneyXL{font-size:23px;}

    .tasksCard{
      height:180px;
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    ul{list-style:none;padding:0;margin:0;}
    .taskList{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:8px;
      min-height:0;
    }
    .taskList.compact li{font-size:15px;line-height:1.12;padding:7px 10px;}
    .taskList.tight li{font-size:13px;line-height:1.08;padding:6px 8px;}
    li{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.02);
      border-radius:12px;
      padding:9px 11px;
      font-size:17px;
      line-height:1.14;
      font-weight:800;
      overflow:hidden;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
    }
    .empty{opacity:.45;}

    .nav{
      display:flex;
      justify-content:center;
      align-items:center;
      height:52px;
      flex:0 0 52px;
      margin-top:-2px;
    }
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      width:74px;height:44px;
      color:#fff;border:1px solid rgba(209,177,106,.35);
      border-radius:13px;font-size:26px;font-weight:900;
      background:linear-gradient(180deg, rgba(209,177,106,.22), rgba(209,177,106,.08));
      box-shadow:0 0 0 1px rgba(209,177,106,.05) inset;
      cursor:pointer;-webkit-appearance:none;appearance:none;
    }

    .reminderSlot{
      grid-column:1 / span 2;
      grid-row:2;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 2px 8px;
    }
    .reminderCard{
      width:100%;
      height:124px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:14px 22px 26px;
    }
    .reminderTitle{
      width:100%;
      text-align:center;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.16em;
      color:var(--accent);
      font-weight:900;
      margin-bottom:10px;
      line-height:1;
    }
    .reminderInner{
      flex:1;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:0;
    }
    .reminder{
      width:100%;
      font-size:23px;
      line-height:1.12;
      font-weight:900;
      color:#fff;
      text-align:center;
      overflow:hidden;
      word-break:break-word;
    }
    .sync{
      position:absolute;
      left:0;right:0;bottom:10px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="clock" id="clock"></div>
  </div>

  <div class="layout">
    <div class="left">
      <div class="stats3">
        <div class="card metricCard">
          <div class="label">Вчера</div>
          <div class="value" id="income_yesterday">—</div>
          <div class="sub">Доход за вчера</div>
        </div>
        <div class="card metricCard">
          <div class="label">Сегодня</div>
          <div class="value" id="income_today">—</div>
          <div class="sub">Доход за сегодня</div>
        </div>
        <div class="card metricCard">
          <div class="label">Текущий месяц</div>
          <div class="value small" id="income_month">—</div>
          <div class="sub">Доход за месяц</div>
        </div>
      </div>

      <div class="stats2">
        <div class="card metricCard">
          <div class="label" id="balance_label">Баланс</div>
          <div class="value" id="balance">—</div>
        </div>
        <div class="card metricCard">
          <div class="label" id="debt_label">Долг</div>
          <div class="value white" id="debt">—</div>
        </div>
      </div>

      <div class="card wideCard">
        <div class="wideRow">
          <div class="wideText" id="safe_label">Сейф</div>
          <div class="wideValue" id="safe_value">—</div>
        </div>
      </div>

      <div class="card goalsCard">
        <div class="panelTitle">Ближайшие цели</div>
        <div class="goalRow">
          <div class="goalText" id="goal_need_label">Необходимый доход</div>
          <div class="goalValue" id="goal_need_value">—</div>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="card tasksCard">
        <div class="panelTitle">Дела на сегодня</div>
        <ul id="tasks_today" class="taskList"></ul>
      </div>

      <div class="card tasksCard">
        <div class="panelTitle">Дела на завтра</div>
        <ul id="tasks_tomorrow" class="taskList"></ul>
      </div>

      <div class="nav">
        <button class="btn" type="button" onclick="goInternal('income.html')">→</button>
      </div>
    </div>

    <div class="reminderSlot">
      <div class="card reminderCard">
        <div class="reminderTitle" id="reminder_label">Главное напоминание</div>
        <div class="reminderInner">
          <div class="reminder" id="reminder_text">—</div>
        </div>
        <div class="sync" id="sync_meta">Нет данных</div>
      </div>
    </div>
  </div>
</div>

<script>
var GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwI-yuwuNLx0mFVocA43t_N1CKe7I1-yVRd1d2PVVhoQqZNyQT8zCa_G-m9UaVQHrFPZA/exec";
var REFRESH_MS = 30000;

function goInternal(url){ window.location.href = url; }

function pad(n){ return (n < 10 ? "0" : "") + n; }
function tickClock(){
  var d = new Date();
  document.getElementById("clock").textContent =
    pad(d.getDate()) + "." + pad(d.getMonth()+1) + "." + d.getFullYear() + " " +
    pad(d.getHours()) + ":" + pad(d.getMinutes());
}
tickClock();
setInterval(tickClock, 1000);

function parseCurrencyValue(v){
  if(v === null || v === undefined || v === "") return null;
  var raw = ("" + v).replace(/ /g, " ").trim();
  if(!raw) return null;
  var currencyMatch = raw.match(/(₽|\$|€|£|₸|₴|₾|₺|₿|AED|USD|EUR|RUB|KZT|UAH|GEL|TRY|BYN|сом|сум|тенге|руб\.?|долл?\.?|евро)/i);
  var currency = currencyMatch ? currencyMatch[0] : "";
  var numPart = raw.replace(/[^0-9,\.\-]/g, "");
  if(!numPart) return { text: raw, currency: currency, number: null };
  var normalized = numPart.replace(/\s+/g, "").replace(/,/g, ".");
  var firstDot = normalized.indexOf('.');
  if(firstDot !== -1){
    normalized = normalized.slice(0, firstDot + 1) + normalized.slice(firstDot + 1).replace(/\./g, '');
  }
  var n = parseFloat(normalized);
  if(isNaN(n)) return { text: raw, currency: currency, number: null };
  var text = n.toLocaleString("ru-RU", {minimumFractionDigits:2, maximumFractionDigits:2});
  if(currency) text += " " + currency;
  return { text: text, currency: currency, number: n };
}
function money(v){
  var parsed = parseCurrencyValue(v);
  return parsed ? parsed.text : "—";
}
function fitMoneyClass(el, text){
  if(!el) return;
  el.className = el.className.replace(/\s?moneyLong/g, '').replace(/\s?moneyXL/g, '');
  var len = (text || '').length;
  if(len >= 16) el.className += ' moneyXL';
  else if(len >= 13) el.className += ' moneyLong';
}
function setText(id, val, isMoney){
  var el = document.getElementById(id);
  if(!el) return;
  if(isMoney){
    var txt = money(val);
    el.textContent = txt;
    fitMoneyClass(el, txt);
  } else {
    el.textContent = val || "—";
  }
}
function setList(id, items){
  var el = document.getElementById(id);
  if(!el) return;
  el.className = "taskList";
  el.innerHTML = "";
  if(!items || !items.length){
    var li = document.createElement("li");
    li.className = "empty";
    li.textContent = "—";
    el.appendChild(li);
    return;
  }
  if(items.length >= 4) el.className = "taskList compact";
  if(items.length >= 6) el.className = "taskList tight";

  for(var i=0;i<items.length;i++){
    var li = document.createElement("li");
    li.textContent = items[i];
    el.appendChild(li);
  }
}
function loadJsonp(){
  var old = document.getElementById("jsonp_script");
  if(old && old.parentNode) old.parentNode.removeChild(old);
  var s = document.createElement("script");
  s.id = "jsonp_script";
  s.src = GAS_WEBAPP_URL + "?callback=renderMain&page=main&_=" + Date.now();
  s.onerror = function(){ document.getElementById("sync_meta").textContent = "Ошибка загрузки данных"; };
  document.body.appendChild(s);
}
function renderMain(data){
  setText("income_yesterday", data.income_yesterday, true);
  setText("income_today", data.income_today, true);
  setText("income_month", data.income_month, true);
  setText("balance", data.balance, true);
  setText("debt", data.debt, true);
  setText("goal_need_value", data.goal_need_value, true);
  setText("safe_value", data.safe, true);
  setText("reminder_text", data.reminder, false);
  setText("balance_label", data.balance_label, false);
  setText("debt_label", data.debt_label, false);
  setText("goal_need_label", data.goal_need_label, false);
  setText("safe_label", data.safe_label, false);
  setText("reminder_label", data.reminder_label, false);
  setList("tasks_today", data.tasks_today || []);
  setList("tasks_tomorrow", data.tasks_tomorrow || []);
  document.getElementById("sync_meta").textContent = data.updated_at ? ("Обновлено: " + data.updated_at) : "OK";
}
loadJsonp();
setInterval(loadJsonp, REFRESH_MS);
</script>
</body>
</html>
