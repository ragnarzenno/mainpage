<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Dashboard</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=C-oT-9NqMkHxoEVGCa68YYNEeKAjuMKnH5iIDiWeJMa6T5qN4gUQFZouCPmvIoFb4fRgrl9vH2TUsHspYITvw7tKyLXHEFYUNzhuUhdr8OFjubySvBwipCuS8qci85THnMa9YnUiZhnJDZeADhcLORM0TzG33KBLJnkEFwJq5VALKeToX_kY0YQ9Ezgv2tcWxktzbxa3ztm39AdbXP4seUmetJPTpC87rYaDSKHfnKI5MxdzTr9AzGmmegh3_JEKOnKdA-88rHa5DhaGudPhtw" charset="UTF-8"></script><style>
    :root{
      --bg:#050608;
      --card:#0b0d12;
      --line:rgba(209,177,106,.18);
      --text:#eef2f7;
      --muted:#97a2b3;
      --gold:#d1b16a;
      --accent:#b89b5e;
    }
    html,body{
      margin:0;padding:0;width:100%;height:100%;
      background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      overflow:hidden;
    }
    .wrap{
      width:1024px;height:768px;margin:0 auto;box-sizing:border-box;
      padding:12px;overflow:hidden;
    }
    .top{
      display:flex;justify-content:flex-end;align-items:center;
      margin-bottom:10px;height:22px;
    }
    .clock{font-size:14px;color:#c6ced9;letter-spacing:.03em;}
    .layout{
      display:grid;grid-template-columns:60% 40%;gap:10px;height:calc(100% - 32px);
    }
    .left,.right{display:flex;flex-direction:column;gap:10px;min-height:0;}
    .stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .stats2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
    .card{
      background:linear-gradient(180deg, rgba(13,16,22,.98), rgba(8,10,14,.98));
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 0 0 1px rgba(209,177,106,.04) inset, 0 10px 30px rgba(0,0,0,.25);
      padding:12px;box-sizing:border-box;overflow:hidden;
    }
    .metricCard{height:108px;}
    .label{
      font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:10px;
    }
    .value{
      font-size:38px;font-weight:900;line-height:1;color:var(--gold);white-space:nowrap;
    }
    .value.small{font-size:34px;}
    .value.white{color:#ffffff;}
    .sub{margin-top:10px;font-size:15px;color:#dfe6f0;}
    .panelTitle{
      margin:0 0 10px 0;font-size:13px;text-transform:uppercase;letter-spacing:.12em;
      color:var(--accent);font-weight:900;
    }
    .goalsCard{flex:1;min-height:0;}
    .goalRow{
      display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;
      border-bottom:1px solid rgba(255,255,255,.08);padding:10px 0;
    }
    .goalRow:last-child{border-bottom:none;}
    .goalText{font-size:17px;line-height:1.18;font-weight:700;}
    .goalValue{font-size:30px;font-weight:900;color:var(--gold);white-space:nowrap;}
    .reminderCard{
      height:122px;
      position:relative;
      display:flex;
      flex-direction:column;
    }
    .reminderInner{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      min-height:0;
      padding:0 28px 18px 28px;
    }
    .reminder{
      font-size:23px;line-height:1.12;font-weight:900;color:#fff;
      max-height:52px;overflow:hidden;
    }
    .sync{
      position:absolute;left:0;right:0;bottom:10px;
      font-size:12px;color:var(--muted);text-align:center;
    }
    .tasksCard{height:188px;}
    ul{list-style:none;padding:0;margin:0;}
    li{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.015);
      border-radius:10px;padding:8px 10px;margin-bottom:7px;
      font-size:17px;line-height:1.16;font-weight:700;
      max-height:38px;overflow:hidden;
    }
    li:last-child{margin-bottom:0;}
    .empty{opacity:.45;}
    .nav{
      display:flex;justify-content:center;align-items:center;
      height:52px;flex:0 0 52px;
    }
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      width:74px;height:46px;
      color:#fff;border:1px solid rgba(209,177,106,.35);
      border-radius:12px;font-size:26px;font-weight:900;
      background:linear-gradient(180deg, rgba(209,177,106,.22), rgba(209,177,106,.08));
      box-shadow:0 0 0 1px rgba(209,177,106,.05) inset;
      cursor:pointer;-webkit-appearance:none;appearance:none;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="clock" id="clock"></div>
  </div>

  <div class="layout">
    <div class="left">
      <div class="stats3">
        <div class="card metricCard">
          <div class="label">Вчера</div>
          <div class="value" id="income_yesterday">—</div>
          <div class="sub">Доход за вчера</div>
        </div>
        <div class="card metricCard">
          <div class="label">Сегодня</div>
          <div class="value" id="income_today">—</div>
          <div class="sub">Доход за сегодня</div>
        </div>
        <div class="card metricCard">
          <div class="label">Текущий месяц</div>
          <div class="value small" id="income_month">—</div>
          <div class="sub">Сумма по таблице</div>
        </div>
      </div>

      <div class="stats2">
        <div class="card metricCard">
          <div class="label" id="balance_label">Баланс</div>
          <div class="value" id="balance">—</div>
        </div>
        <div class="card metricCard">
          <div class="label" id="debt_label">Долг</div>
          <div class="value white" id="debt">—</div>
        </div>
      </div>

      <div class="card goalsCard">
        <div class="panelTitle">Ближайшие цели</div>
        <div class="goalRow">
          <div class="goalText" id="goal_need_label">Необходимо заработать</div>
          <div class="goalValue" id="goal_need_value">—</div>
        </div>
        <div class="goalRow">
          <div class="goalText" id="safe_label">Сейф</div>
          <div class="goalValue" id="safe_value">—</div>
        </div>
      </div>

      <div class="card reminderCard">
        <div class="panelTitle" id="reminder_label">Главное напоминание</div>
        <div class="reminderInner">
          <div class="reminder" id="reminder_text">—</div>
        </div>
        <div class="sync" id="sync_meta">Нет данных</div>
      </div>
    </div>

    <div class="right">
      <div class="card tasksCard">
        <div class="panelTitle">Дела на сегодня</div>
        <ul id="tasks_today"></ul>
      </div>

      <div class="card tasksCard">
        <div class="panelTitle">Дела на завтра</div>
        <ul id="tasks_tomorrow"></ul>
      </div>

      <div class="nav">
        <button class="btn" type="button" onclick="goInternal('income.html')">→</button>
      </div>
    </div>
  </div>
</div>

<script>
var GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwI-yuwuNLx0mFVocA43t_N1CKe7I1-yVRd1d2PVVhoQqZNyQT8zCa_G-m9UaVQHrFPZA/exec";
var REFRESH_MS = 30000;

function goInternal(url){ window.location.href = url; }

function pad(n){ return (n < 10 ? "0" : "") + n; }
function tickClock(){
  var d = new Date();
  document.getElementById("clock").textContent =
    pad(d.getDate()) + "." + pad(d.getMonth()+1) + "." + d.getFullYear() + " " +
    pad(d.getHours()) + ":" + pad(d.getMinutes());
}
tickClock();
setInterval(tickClock, 1000);

function money(v){
  if(v === null || v === undefined || v === "") return "—";
  var s = ("" + v).replace(/\s+/g, "").replace(",", ".");
  var n = parseFloat(s);
  if(isNaN(n)) return "" + v;
  return n.toLocaleString("ru-RU", {minimumFractionDigits:2, maximumFractionDigits:2});
}
function setText(id, val, isMoney){
  var el = document.getElementById(id);
  if(!el) return;
  el.textContent = isMoney ? money(val) : (val || "—");
}
function setList(id, items){
  var el = document.getElementById(id);
  if(!el) return;
  el.innerHTML = "";
  if(!items || !items.length){
    var li = document.createElement("li");
    li.className = "empty";
    li.textContent = "—";
    el.appendChild(li);
    return;
  }
  for(var i=0;i<items.length && i<3;i++){
    var li = document.createElement("li");
    li.textContent = items[i];
    el.appendChild(li);
  }
}
function loadJsonp(){
  var old = document.getElementById("jsonp_script");
  if(old && old.parentNode) old.parentNode.removeChild(old);
  var s = document.createElement("script");
  s.id = "jsonp_script";
  s.src = GAS_WEBAPP_URL + "?callback=renderMain&page=main&_=" + Date.now();
  s.onerror = function(){ document.getElementById("sync_meta").textContent = "Ошибка загрузки данных"; };
  document.body.appendChild(s);
}
function renderMain(data){
  setText("income_yesterday", data.income_yesterday, true);
  setText("income_today", data.income_today, true);
  setText("income_month", data.income_month, true);
  setText("balance", data.balance, true);
  setText("debt", data.debt, true);
  setText("goal_need_value", data.goal_need_value, true);
  setText("safe_value", data.safe, true);
  setText("reminder_text", data.reminder, false);
  setText("balance_label", data.balance_label, false);
  setText("debt_label", data.debt_label, false);
  setText("goal_need_label", data.goal_need_label, false);
  setText("safe_label", data.safe_label, false);
  setText("reminder_label", data.reminder_label, false);
  setList("tasks_today", data.tasks_today || []);
  setList("tasks_tomorrow", data.tasks_tomorrow || []);
  document.getElementById("sync_meta").textContent = data.updated_at ? ("Обновлено: " + data.updated_at) : "OK";
}
loadJsonp();
setInterval(loadJsonp, REFRESH_MS);
</script>
</body>
</html>
