<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Dashboard</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root {
      --bg:#050608;
      --card:#0b0d12;
      --line:rgba(255,255,255,.08);
      --text:#eef2f7;
      --muted:#97a2b3;
      --gold:#d1b16a;
      --accent:#b89b5e;
      --white:#f5f7fb;
    }
    html,body {
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      overflow:hidden;
    }
    .wrap {
      width:1024px;
      height:768px;
      margin:0 auto;
      box-sizing:border-box;
      padding:10px 12px;
      overflow:hidden;
    }
    .top {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      min-height:24px;
    }
    .topClockOnly {
      justify-content:flex-end;
    }
    .clock {
      font-size:14px;
      color:#a0a8b3;
    }
    .dashboardBody {
      display:grid;
      grid-template-rows:1fr auto;
      gap:10px;
      height:calc(100% - 44px);
      min-height:0;
    }
    .grid {
      display:grid;
      grid-template-columns:58% 42%;
      gap:10px;
      min-height:0;
    }
    .left, .right {
      display:grid;
      gap:10px;
      min-height:0;
    }
    .left {
      grid-template-rows:auto auto 1fr;
    }
    .right {
      grid-template-rows:1fr 1fr auto;
    }
    .metrics {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }
    .two {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .card {
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.012));
      border:1px solid rgba(209,177,106,.18);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 6px 22px rgba(0,0,0,.28);
      border-radius:12px;
      padding:12px;
      box-sizing:border-box;
      overflow:hidden;
      min-height:0;
    }
    .label {
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:#9ea6b1;
      margin-bottom:10px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .value {
      font-size:34px;
      font-weight:900;
      line-height:1;
      color:var(--gold);
    }
    .value.small { font-size:28px; }
    .value.debt { color:var(--white); }
    .sub {
      margin-top:8px;
      font-size:12px;
      color:#a7aeb8;
      line-height:1.15;
      max-height:28px;
      overflow:hidden;
    }
    .panelTitle {
      margin:0 0 8px 0;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--accent);
      text-shadow:0 0 12px rgba(209,177,106,.08);
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .goalRow {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid var(--line);
    }
    .goalRow:last-child {
      border-bottom:none;
      padding-bottom:0;
    }
    .goalText {
      font-size:17px;
      line-height:1.15;
      font-weight:700;
      flex:1;
    }
    .goalValue {
      font-size:30px;
      font-weight:900;
      color:var(--gold);
      white-space:nowrap;
      text-align:right;
    }
    .reminderCard {
      padding:14px 18px;
      text-align:center;
    }
    .reminder {
      font-size:22px;
      line-height:1.16;
      font-weight:900;
      color:#fff;
      max-height:52px;
      overflow:hidden;
    }
    ul {
      list-style:none;
      padding:0;
      margin:0;
      display:grid;
      gap:7px;
    }
    li {
      border:1px solid var(--line);
      background:rgba(255,255,255,.012);
      border-radius:10px;
      padding:8px 10px;
      font-size:16px;
      line-height:1.16;
      font-weight:700;
      overflow:hidden;
    }
    .singleLine li {
      white-space:nowrap;
      text-overflow:ellipsis;
    }
    .empty {
      opacity:.45;
    }
    .nav {
      display:flex;
      justify-content:flex-end;
      align-items:center;
    }
    .btn {
      display:inline-block;
      text-decoration:none;
      color:#fff;
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px 14px;
      font-size:15px;
      font-weight:800;
      background:linear-gradient(180deg, rgba(209,177,106,.12), rgba(209,177,106,.05));
      cursor:pointer;
      -webkit-appearance:none;
      appearance:none;
    }
    .sync {
      font-size:12px;
      color:#8f949d;
      margin-top:6px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="top topClockOnly">
    <div class="clock" id="clock">—</div>
  </div>

  <div class="dashboardBody">
    <div class="grid">
      <div class="left">
        <div class="metrics">
          <div class="card">
            <div class="label" id="label_income_yesterday">Вчера</div>
            <div class="value" id="income_yesterday">—</div>
            <div class="sub" id="sub_income_yesterday">—</div>
          </div>
          <div class="card">
            <div class="label" id="label_income_today">Сегодня</div>
            <div class="value" id="income_today">—</div>
            <div class="sub" id="sub_income_today">—</div>
          </div>
          <div class="card">
            <div class="label" id="label_income_month">Текущий месяц</div>
            <div class="value small" id="income_month">—</div>
            <div class="sub" id="sub_income_month">—</div>
          </div>
        </div>

        <div class="two">
          <div class="card">
            <div class="label" id="label_balance">Баланс</div>
            <div class="value" id="balance">—</div>
          </div>
          <div class="card">
            <div class="label" id="label_debt">Долг</div>
            <div class="value debt" id="debt">—</div>
          </div>
        </div>

        <div class="card">
          <div class="panelTitle" id="panel_goals">Ближайшие цели</div>
          <div class="goalRow">
            <div class="goalText" id="goal_need_label">—</div>
            <div class="goalValue" id="goal_need_value">—</div>
          </div>
          <div class="goalRow">
            <div class="goalText" id="safe_label">—</div>
            <div class="goalValue" id="safe_value">—</div>
          </div>
        </div>
      </div>

      <div class="right">
        <div class="card">
          <div class="panelTitle" id="panel_today_tasks">Дела на сегодня</div>
          <ul id="tasks_today" class="singleLine"></ul>
        </div>

        <div class="card">
          <div class="panelTitle" id="panel_tomorrow_tasks">Дела на завтра</div>
          <ul id="tasks_tomorrow"></ul>
        </div>

        <div class="nav">
          <button class="btn" type="button" onclick="goInternal('income.html')">Страница дохода →</button>
        </div>
      </div>
    </div>

    <div class="card reminderCard">
      <div class="panelTitle" id="panel_reminder">Главное напоминание</div>
      <div class="reminder" id="reminder_text">—</div>
      <div class="sync" id="sync_meta">Нет данных</div>
    </div>
  </div>
</div>

<script>
var GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwI-yuwuNLx0mFVocA43t_N1CKe7I1-yVRd1d2PVVhoQqZNyQT8zCa_G-m9UaVQHrFPZA/exec";
var REFRESH_MS = 30000;

function pad(n) {
  return (n < 10 ? "0" : "") + n;
}

function tickClock() {
  var d = new Date();
  document.getElementById("clock").textContent =
    pad(d.getDate()) + "." + pad(d.getMonth() + 1) + "." + d.getFullYear() + "  " +
    pad(d.getHours()) + ":" + pad(d.getMinutes());
}

tickClock();
setInterval(tickClock, 1000);

function money(v) {
  if (v === null || v === undefined || v === "") return "—";
  var s = ("" + v).replace(/\s+/g, "").replace(",", ".");
  var num = parseFloat(s);
  if (isNaN(num)) return "" + v;
  var parts = (Math.round(num * 100) / 100).toFixed(2).split(".");
  var intp = parts[0], frac = parts[1], out = "";
  for (var i = 0; i < intp.length; i++) {
    var ch = intp[intp.length - 1 - i];
    out = ch + out;
    if ((i + 1) % 3 === 0 && i !== intp.length - 1) out = " " + out;
  }
  return out + "," + frac;
}

function setText(id, val, asMoney) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = asMoney ? money(val) : ((val || "").toString().trim() || "—");
}

function setList(id, items) {
  var el = document.getElementById(id);
  el.innerHTML = "";
  if (!items || !items.length) {
    var li = document.createElement("li");
    li.className = "empty";
    li.textContent = "—";
    el.appendChild(li);
    return;
  }
  for (var i = 0; i < items.length; i++) {
    var li = document.createElement("li");
    li.textContent = items[i];
    el.appendChild(li);
  }
}

function loadJsonp() {
  var old = document.getElementById("jsonp_script");
  if (old && old.parentNode) old.parentNode.removeChild(old);

  var s = document.createElement("script");
  s.id = "jsonp_script";
  s.src = GAS_WEBAPP_URL + "?callback=renderMain&page=main&_=" + Date.now();
  s.onerror = function() {
    document.getElementById("sync_meta").textContent = "Ошибка загрузки данных";
  };
  document.body.appendChild(s);
}

function renderMain(data) {
  if (!data || data.ok === false) {
    document.getElementById("sync_meta").textContent = data && data.error ? ("Ошибка: " + data.error) : "Ошибка данных";
    return;
  }

  setText("label_income_yesterday", data.label_income_yesterday, false);
  setText("sub_income_yesterday", data.sub_income_yesterday, false);
  setText("label_income_today", data.label_income_today, false);
  setText("sub_income_today", data.sub_income_today, false);
  setText("label_income_month", data.label_income_month, false);
  setText("sub_income_month", data.sub_income_month, false);
  setText("label_balance", data.label_balance, false);
  setText("label_debt", data.label_debt, false);
  setText("panel_goals", data.panel_goals, false);
  setText("goal_need_label", data.goal_need_label, false);
  setText("safe_label", data.safe_label, false);
  setText("panel_reminder", data.panel_reminder, false);
  setText("panel_today_tasks", data.panel_today_tasks, false);
  setText("panel_tomorrow_tasks", data.panel_tomorrow_tasks, false);

  setText("income_yesterday", data.income_yesterday, true);
  setText("income_today", data.income_today, true);
  setText("income_month", data.income_month, true);
  setText("balance", data.balance, true);
  setText("debt", data.debt, true);
  setText("goal_need_value", data.goal_need_value, true);
  setText("safe_value", data.safe, true);
  setText("reminder_text", data.reminder, false);
  setList("tasks_today", data.tasks_today || []);
  setList("tasks_tomorrow", data.tasks_tomorrow || []);

  document.getElementById("sync_meta").textContent = data.updated_at ? ("Обновлено: " + data.updated_at) : "OK";
}

loadJsonp();
setInterval(loadJsonp, REFRESH_MS);
function goInternal(url) {
  window.location.href = url;
}

document.addEventListener('click', function(e) {
  var node = e.target;
  while (node && node !== document) {
    if (node.tagName === 'A' && node.getAttribute('href')) {
      var href = node.getAttribute('href');
      if (href.indexOf('http') !== 0 && href.indexOf('//') !== 0 && href.charAt(0) !== '#') {
        e.preventDefault();
        window.location.href = href;
        return;
      }
    }
    node = node.parentNode;
  }
}, false);
</script>
</body>
</html>
